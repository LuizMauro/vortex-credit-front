name: Deploy AWS

on:
  push:
    branches: [main]

env:
  AWS_REGION: sa-east-1

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      shell: ${{ steps.filter.outputs.shell }}
      core: ${{ steps.filter.outputs.core }}
      carteira: ${{ steps.filter.outputs.carteira }}
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            packages:
              - 'packages/**'
            shell:
              - 'apps/shell/**'
            core:
              - 'apps/core/**'
            carteira:
              - 'apps/carteira/**'

  quality:
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx turbo run lint type-check

  deploy-core:
    runs-on: ubuntu-latest
    needs: [detect-changes, quality]
    if: |
      needs.detect-changes.outputs.core == 'true' || needs.detect-changes.outputs.packages == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=apps/core
        env:
          NODE_ENV: production
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - run: aws s3 sync apps/core/dist s3://${{ secrets.S3_BUCKET }}/core --delete
      - run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CF_DISTRIBUTION_CORE }} --paths "/*"

  deploy-carteira:
    runs-on: ubuntu-latest
    needs: [detect-changes, quality]
    if: |
      needs.detect-changes.outputs.carteira == 'true' || needs.detect-changes.outputs.packages == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=apps/carteira
        env:
          NODE_ENV: production
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - run: aws s3 sync apps/carteira/dist s3://${{ secrets.S3_BUCKET }}/carteira --delete
      - run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CF_DISTRIBUTION_CARTEIRA }} --paths "/*"

  deploy-shell:
    runs-on: ubuntu-latest
    needs: [detect-changes, quality, deploy-core, deploy-carteira]
    if: |
      always() &&
      (needs.detect-changes.outputs.shell == 'true' || needs.detect-changes.outputs.packages == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=apps/shell
        env:
          NODE_ENV: production
          VITE_MFE_CORE_URL: ${{ vars.MFE_CORE_URL }}
          VITE_MFE_CARTEIRA_URL: ${{ vars.MFE_CARTEIRA_URL }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - run: aws s3 sync apps/shell/dist s3://${{ secrets.S3_BUCKET }}/shell --delete
      - run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CF_DISTRIBUTION_SHELL }} --paths "/*"
